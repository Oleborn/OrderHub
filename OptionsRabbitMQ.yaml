spring:
  rabbitmq:
    # ===================================================================
    # АДРЕСА И ПОДКЛЮЧЕНИЕ
    # ===================================================================

    # Список адресов кластера RabbitMQ в формате "host1:port,host2:port".
    # Используется для подключения к кластеру из нескольких узлов.
    # Если указан, то host и port игнорируются.
    # Пример: "rabbitmq-1:5672,rabbitmq-2:5672,rabbitmq-3:5672"
    addresses: null

    # Хост брокера (одиночный узел). В Docker Compose — имя сервиса.
    host: rabbitmq

    # Порт AMQP. 5672 — стандартный порт для AMQP 0-9-1.
    port: 5672

    # ===================================================================
    # АУТЕНТИФИКАЦИЯ
    # ===================================================================

    # Логин пользователя. В production — отдельный пользователь с минимальными правами.
    # По умолчанию RabbitMQ создаёт пользователя "guest".
    username: guest

    # Пароль. В production — хранить в secrets (Vault, Kubernetes Secrets, env variables).
    # Никогда не коммитить пароль в репозиторий!
    password: guest

    # Виртуальный хост (vhost). Логическая изоляция очередей, обменников и прав.
    # По умолчанию "/". В production часто создают "/production", "/staging".
    # Каждый vhost имеет свои очереди, обменники и пользователей.
    virtual-host: /

    # ===================================================================
    # ТАЙМАУТЫ И HEARTBEAT
    # ===================================================================

    # Таймаут установки TCP-соединения с брокером.
    # Если за это время соединение не установлено — ошибка.
    # 0 — бесконечное ожидание (не рекомендуется для production).
    connection-timeout: 5s

    # Интервал heartbeat-фреймов (keep-alive).
    # Каждые N секунд клиент и брокер обмениваются служебными сообщениями.
    # Если брокер не получает heartbeat за 2 интервала — считает соединение мёртвым.
    # 0 — heartbeat отключен (не рекомендуется).
    requested-heartbeat: 30s

    # Максимальное количество AMQP-каналов на одном TCP-соединении.
    # Канал — виртуальная сессия внутри соединения. Каждый listener и publisher
    # открывают свой канал.
    # 2047 — максимум по спецификации AMQP 0-9-1.
    requested-channel-max: 2047

    # Таймаут для RPC-операций канала (объявление очередей, обменников).
    # 10 минут по умолчанию. Редко требует изменения.
    channel-rpc-timeout: 10m

    # ===================================================================
    # ДИНАМИЧЕСКОЕ СОЗДАНИЕ КОНТЕЙНЕРОВ
    # ===================================================================

    # Автоматически создавать контейнеры для @RabbitListener при старте.
    # true (по умолчанию) — все @RabbitListener запускаются автоматически.
    # false — контейнеры создаются, но не стартуют. Запуск через
    #         RabbitListenerEndpointRegistry.start().
    dynamic: true

    # ===================================================================
    # ПУЛ СОЕДИНЕНИЙ И КАНАЛОВ (ConnectionFactory)
    # ===================================================================
    cache:
      connection:
        # Режим кэширования соединений.
        # "CHANNEL" (по умолчанию) — одно TCP-соединение, много каналов внутри него.
        #         Каналы дешёвые, создаются быстро. Рекомендуется для большинства случаев.
        # "CONNECTION" — пул TCP-соединений. Каждый поток получает своё соединение.
        #         Дороже по ресурсам, но изолирует потоки. Нужно редко.
        mode: CHANNEL

        # Размер пула соединений. Используется только при mode=CONNECTION.
        # Максимальное количество TCP-соединений в пуле.
        size: 1

      channel:
        # Максимальное количество каналов в кэше.
        # null — автоматически (обычно равно количеству listener-потоков + publisher каналы).
        # Если каналов не хватает — создаются новые, но не кэшируются.
        size: null

        # Таймаут ожидания свободного канала из пула.
        # 0 — ждать бесконечно (не рекомендуется).
        # null — ждать бесконечно (по умолчанию).
        checkout-timeout: null

    # ===================================================================
    # SSL / TLS (безопасное соединение)
    # ===================================================================
    ssl:
      # Включить SSL/TLS шифрование.
      # В production — ОБЯЗАТЕЛЬНО true для защиты данных в сети.
      enabled: false

      # Алгоритм SSL/TLS. TLSv1.2 — минимальная безопасная версия.
      # TLSv1.3 — современный стандарт, если поддерживается брокером.
      algorithm: TLSv1.2

      # Путь к keystore (PKCS12) с клиентским сертификатом.
      # Используется, если брокер требует аутентификацию по сертификату.
      key-store: null
      key-store-password: null
      key-store-type: PKCS12

      # Путь к truststore (JKS) с доверенными сертификатами брокера.
      trust-store: null
      trust-store-password: null
      trust-store-type: JKS

      # Проверять сертификат брокера при подключении.
      # false — только для тестов!
      validate-server-certificate: true

      # Проверять hostname в сертификате брокера.
      # Защита от MITM-атак.
      verify-hostname: true

    # ===================================================================
    # PUBLISHER — НАСТРОЙКИ ПУБЛИКАЦИИ
    # ===================================================================

    # Тип подтверждений от брокера (Publisher Confirms).
    # "none" (по умолчанию) — подтверждения отключены. Сообщение считается отправленным,
    #         как только ушло в сокет. Нет гарантий, что брокер его получил.
    # "simple" — подтверждения включены, но без корреляции. Вызывается ConfirmCallback,
    #         но нельзя понять, КАКОЕ сообщение подтверждено.
    # "correlated" — подтверждения с корреляцией. Каждое сообщение получает уникальный
    #         CorrelationData, который возвращается в ConfirmCallback.
    #         Золотой стандарт для production.
    publisher-confirm-type: correlated

    # Включать механизм Publisher Returns.
    # true — если брокер не может доставить сообщение ни в одну очередь
    #        (неправильный routing key, нет привязки), он вернёт сообщение
    #        продюсеру через ReturnsCallback, а не молча удалит.
    # false — недоставленные сообщения удаляются без уведомления.
    publisher-returns: true

    # ===================================================================
    # RABBIT TEMPLATE — КОНФИГУРАЦИЯ ОТПРАВКИ
    # ===================================================================
    template:
      # Сообщение ОБЯЗАНО быть доставлено хотя бы в одну очередь.
      # true — если routing key не совпадает ни с одной привязкой, брокер
      #        возвращает сообщение через Publisher Return (если включены returns).
      # false — брокер молча удалит недоставленное сообщение.
      # ВСЕГДА ставьте true для критичных сообщений!
      mandatory: true

      # Exchange по умолчанию. Если указан, convertAndSend() будет использовать
      # этот exchange, если не указан явно.
      # "" — Default Exchange (маршрутизация по имени очереди).
      exchange: ""

      # Routing key по умолчанию. Используется, если не указан в convertAndSend().
      routing-key: ""

      # Очередь по умолчанию для receiveAndConvert() — синхронного получения сообщения.
      # Используется редко (обычно для RPC, что мы считаем анти-паттерном).
      default-receive-queue: null

      # Таймаут для receiveAndConvert() — сколько ждать сообщение.
      # null — ждать бесконечно.
      receive-timeout: null

      # Таймаут для sendAndReceive() — RPC-запроса.
      # Сколько ждать ответ от consumer'а.
      # Не используется в асинхронных сценариях.
      reply-timeout: null

      # Кодировка сообщений. UTF-8 — стандарт для JSON.
      encoding: UTF-8

      # ===================================================================
      # TEMPLATE RETRY — ПОВТОРНЫЕ ПОПЫТКИ ОТПРАВКИ (PRODUCER SIDE)
      # ===================================================================
      retry:
        # Включить автоматические повторные попытки при ошибках ОТПРАВКИ.
        # Это retry на стороне Producer'а — когда сообщение не удалось отправить
        # в брокер из-за сетевых проблем (connection refused, timeout, etc.).
        # НЕ ПУТАТЬ с retry на стороне Consumer'а (обработка сообщения)!
        enabled: true

        # Начальная задержка перед ПЕРВОЙ повторной попыткой.
        # После первой неудачной отправки ждём 1 секунду.
        initial-interval: 1s

        # Максимальное количество попыток (включая первую).
        # 3 — всего до 3 попыток отправить сообщение:
        #   1-я (исходная) → ошибка сети
        #   2-я (через 1s) → ошибка сети
        #   3-я (через 2s) → успех или исключение AmqpException
        max-attempts: 3

        # Множитель задержки для экспоненциального backoff.
        # Каждая следующая задержка = предыдущая × multiplier.
        # 2.0 даёт последовательность: 1s → 2s → 4s (до max-interval).
        multiplier: 2.0

        # Максимальная задержка между попытками.
        # Защита от слишком долгих пауз при большом количестве попыток.
        # Даже если по формуле получилось больше — ждём не более 10 секунд.
        max-interval: 10s

    # ===================================================================
    # LISTENER — НАСТРОЙКИ ПОТРЕБИТЕЛЯ (CONSUMER)
    # ===================================================================
    listener:
      # Тип контейнера слушателя.
      # "simple" (по умолчанию) — SimpleMessageListenerContainer.
      #         Блокирующий, использует пул потоков. Традиционный вариант.
      #         Каждый поток ждёт сообщение через blocking poll.
      # "direct" — DirectMessageListenerContainer.
      #         Неблокирующий, использует AMQP-потребителей напрямую.
      #         Меньше потоков, лучше для высоких нагрузок.
      type: simple

      # ===================================================================
      # SIMPLE LISTENER CONTAINER (основной)
      # ===================================================================
      simple:
        # Режим подтверждения обработки (ACK).
        # "none" — нативный auto-ack RabbitMQ. Брокер считает сообщение обработанным
        #         СРАЗУ при доставке, до вызова метода слушателя.
        #         Если приложение упадёт — сообщение ПОТЕРЯНО.
        #         НЕ ИСПОЛЬЗОВАТЬ для важных данных!
        # "auto" — Spring подтверждает сообщение после УСПЕШНОГО выхода из метода
        #         слушателя (включая retry). При исключении — откат согласно retry.
        #         Безопасный режим, рекомендуется для большинства случаев.
        # "manual" — ручное подтверждение. Разработчик сам вызывает channel.basicAck()
        #         или channel.basicNack(). Полный контроль, но требует дисциплины.
        # "reject" — автоматический basicReject при любом исключении.
        acknowledge-mode: auto

        # Prefetch count — сколько сообщений брокер может отправить consumer'у
        # до получения подтверждения (ACK).
        # Поток держит до N сообщений в своём буфере.
        # 1-10 — для медленных задач (email, генерация отчётов).
        #        Равномерное распределение между воркерами.
        # 50-250 — для быстрых задач (запись в кэш).
        #          Выше пропускная способность, но менее равномерно.
        prefetch: 10

        # Минимальное количество потоков-обработчиков.
        # При старте создаётся N потоков, каждый слушает очередь.
        # Сообщения распределяются round-robin между потоками.
        concurrency: 3

        # Максимальное количество потоков.
        # При росте нагрузки Spring может добавить потоков до этого числа.
        # После спада лишние потоки завершаются (если они простаивают).
        max-concurrency: 10

        # Альтернативный способ задания concurrency: количество consumer'ов НА ОЧЕРЕДЬ.
        # Если указан, concurrency и max-concurrency игнорируются.
        # Полезно, когда один listener слушает несколько очередей.
        consumers-per-queue: null

        # Размер пакета для batch-обработки.
        # Если указан, метод слушателя должен принимать List<Message>.
        # Весь пакет подтверждается одной операцией ACK.
        batch-size: null

        # Включить batch-обработку сообщений.
        # true — consumer получает пакеты сообщений вместо одиночных.
        consumer-batch-enabled: false

        # Автоматически распаковывать батчи в отдельные сообщения.
        # true — даже если брокер прислал батч, слушатель получит сообщения по одному.
        # false — слушатель получит весь батч как список.
        de-batching-enabled: true

        # Что делать с сообщением после исчерпания ВСЕХ повторных попыток.
        # false — НЕ возвращать в очередь (requeue=false).
        #         Сообщение уходит в Dead Letter Exchange → DLQ.
        #         Это правильное поведение для production!
        # true — ВЕРНУТЬ в очередь (requeue=true).
        #         ОПАСНО! Может вызвать бесконечный цикл для poison messages.
        #         Использовать только с защитой (x-message-ttl, x-delivery-limit).
        default-requeue-rejected: false

        # Останавливать приложение, если очереди из @RabbitListener не существуют.
        # true (по умолчанию) — fail-fast: если брокер не имеет очереди,
        #         приложение не стартует. Защита от ошибок конфигурации.
        # false — приложение стартует, но listener не работает.
        missing-queues-fatal: true

        # Интервал публикации событий простоя контейнера (idle events).
        # Каждые N миллисекунд будет публиковаться событие, если очередь пуста.
        # Полезно для мониторинга: можно отслеживать, как долго очередь пустует.
        # null — события простоя не публикуются.
        idle-event-interval: null

        # Запускать ли контейнер автоматически при старте приложения.
        # true (по умолчанию) — listener стартует вместе с приложением.
        # false — контейнер создаётся, но не стартует. Запуск через
        #         RabbitListenerEndpointRegistry.start().
        # Полезно для отложенного старта (сначала прогреть кэш, потом слушать).
        auto-startup: true

        # Максимальное количество сообщений, получаемых за один poll (poll — операция
        # получения сообщений от брокера).
        # Используется для ограничения размера транзакции в transactional channels.
        # null — не ограничено.
        max-messages-per-poll: null

        # Размер транзакции для transactional channels.
        # Если указан, каждые N сообщений будут подтверждаться в одной транзакции.
        # Используется, если брокер настроен на transactional publishing.
        # null — транзакции не используются.
        transaction-size: null

        # Фаза жизненного цикла (SmartLifecycle).
        # Определяет порядок старта/остановки контейнера относительно других бинов.
        # Полезно, когда нужно гарантировать порядок запуска.
        # null — фаза по умолчанию (0).
        phase: null

        # Таймаут принудительного закрытия контейнера (в миллисекундах).
        # При shutdown приложения контейнер ждёт завершения текущих операций.
        # Если за это время операции не завершены — принудительное закрытие.
        # null — ждать бесконечно.
        force-close-timeout: null

        # Интервал между попытками восстановления контейнера после сбоя.
        # Если соединение с брокером потеряно, контейнер пытается переподключиться
        # каждые N миллисекунд.
        recovery-interval: 5000

        # Экспоненциальный backoff для восстановления контейнера.
        # Вместо постоянного интервала recovery-interval можно использовать
        # нарастающие задержки.
        recovery-backoff:
          initial-interval: 1000    # Начальная задержка (1 секунда)
          multiplier: 2.0           # Множитель (1s → 2s → 4s → 8s ...)
          max-interval: 30000       # Максимальная задержка (30 секунд)

        # ===================================================================
        # LISTENER RETRY — ПОВТОРНЫЕ ПОПЫТКИ ОБРАБОТКИ (CONSUMER SIDE)
        # ===================================================================
        retry:
          # Включить автоматические повторные попытки при ошибках ОБРАБОТКИ.
          # Это retry на стороне Consumer'а — когда метод слушателя выбросил исключение.
          # Retry происходит В ПАМЯТИ, сообщение остаётся в статусе unacked.
          # Брокер НЕ знает о повторах — он просто ждёт ACK.
          # НЕ ПУТАТЬ с retry на стороне Producer'а!
          enabled: true

          # Начальная задержка перед ПЕРВОЙ повторной попыткой.
          # После исключения ждём 2 секунды, затем повторяем метод.
          initial-interval: 2s

          # Максимальное количество попыток обработки (включая первую).
          # 3 — всего до 3 вызовов метода handle():
          #   1-й → исключение
          #   2-й (через 2s) → исключение
          #   3-й (через 4s) → успех или исчерпание попыток
          max-attempts: 3

          # Множитель задержки для экспоненциального backoff.
          # 2.0 даёт: 2s → 4s → 8s (до max-interval).
          multiplier: 2.0

          # Максимальная задержка между попытками.
          # Защита от слишком долгих пауз.
          max-interval: 10s

          # Тип retry: stateless или stateful.
          # "stateless" (по умолчанию) — каждый retry независим, не сохраняет состояние.
          #         Подходит для идемпотентных операций (отправка email, запись в БД
          #         с проверкой дубликатов).
          # "stateful" — сохраняет состояние между попытками. Используется для
          #         транзакционных операций, где важна целостность данных.
          #         Требует особой настройки TransactionManager.
          stateless: true

      # ===================================================================
      # DIRECT LISTENER CONTAINER (альтернативный, неблокирующий)
      # ===================================================================
      direct:
        # Режим подтверждения — такой же, как в simple.
        # "none" / "auto" / "manual" / "reject".
        acknowledge-mode: auto

        # Prefetch count — такой же, как в simple.
        prefetch: 10

        # Количество consumer'ов на очередь.
        # В Direct контейнере нет пула потоков — каждый consumer обслуживается
        # отдельным AMQP-каналом.
        consumers-per-queue: 1

        # Останавливать приложение при отсутствии очередей.
        missing-queues-fatal: true

        # Интервал событий простоя.
        idle-event-interval: null

        # Автоматический запуск при старте.
        auto-startup: true

        # Фаза жизненного цикла.
        phase: null

        # Таймаут принудительного закрытия.
        force-close-timeout: null

        # Интервал восстановления после сбоя.
        recovery-interval: 5000

        # Экспоненциальный backoff для восстановления.
        recovery-backoff:
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 30000

        # Retry для Direct контейнера (по умолчанию отключен).
        retry:
          enabled: false
          initial-interval: 2s
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10s
          stateless: true

      # ===================================================================
      # RABBITMQ STREAMS (новый протокол, не AMQP 0-9-1)
      # ===================================================================
      stream:
        # Имя контейнера для streams.
        # Если null — генерируется автоматически.
        name: null

        # Позиция начала чтения из stream.
        # "last" — читать с конца (новые сообщения).
        # "next" — читать следующее после последнего прочитанного.
        # offset(value) — читать с конкретного offset (число).
        offset: last

        # Размер пакета при чтении из stream.
        batch-size: 500

        # Бин для программной кастомизации stream consumer'а.
        # Позволяет задать фильтры, стратегию обработки ошибок.
        consumer-customizer: null