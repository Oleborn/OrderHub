spring:
  application:
    name: order-service

  profiles:
    active: elk

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    enabled: true
    change-log: classpath:/db/changelog/changelog_master.yaml

  task:
    scheduling:
      pool:
        size: 5                # Размер пула потоков для @Scheduled/если надо
      thread-name-prefix: "scheduled-"
      shutdown:
        await-termination: true
        await-termination-period: 60s


management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0   # в демо берём 100%, в production меньше (0.1, 0.01)
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: http://jaeger:4318/v1/traces

  prometheus:
    metrics:
      export:
        enabled: true
        descriptions: true

  metrics:
    distribution:
      percentiles-histogram:
        all: true
      slo:
        "[http.server.requests]": 50ms,100ms,200ms,500ms,1s,2s
  info:
    env:
      enabled: true
    git:
      mode: full
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include:
          - health
          - metrics
          - info
          - prometheus
          - loggers

info:
  app:
    name: "order-service"
    version: "0.0.1"
    description: "Учимся писать продакшен код"

server:
  port: 8081

logging:
  level:
#    org.hibernate.SQL: DEBUG
    root: info

spring.jooq.sql-dialect: POSTGRES

url:
  notification-service: ${NOTIFICATION_SERVICE_URL}
  payment-service: ${PAYMENT_SERVICE_URL}

resilience4j:
  retry:
    retryAspectOrder: 2
    configs:
      default:
        maxAttempts: 3
        waitDuration: 200ms
        exponentialBackoffMultiplier: 2.0
        exponentialMaxWaitDuration: 10s
        randomizedWaitFactor: 0.3
        retryExceptions:
          - feign.FeignException
          - org.springframework.web.reactive.function.client.WebClientResponseException
          - oleborn.order_service.order.exception.PaymentFailedException

          - io.netty.handler.timeout.ReadTimeoutException
          - java.util.concurrent.TimeoutException
#          - java.lang.RuntimeException
        ignoreExceptions:
          - java.lang.IllegalArgumentException
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
        failAfterMaxAttempts: true
    instances:
      paymentService:
        baseConfig: default
        maxAttempts: 4
  circuitbreaker:
    circuitBreakerAspectOrder: 1
    configs:
      default: # базовая конфигурация для всех экземпляров
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      paymentService:
        baseConfig: default            # наследуем всё из default
        slidingWindowSize: 10          # переопределяем только размер окна
        failureRateThreshold: 40        # и порог ошибок
        minimumNumberOfCalls: 10        # после какого количества начинаем
        recordExceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException
          - oleborn.order_service.order.exception.PaymentFailedException

          - io.netty.handler.timeout.ReadTimeoutException
          - java.util.concurrent.TimeoutException
          - io.github.resilience4j.bulkhead.BulkheadFullException
#          - java.lang.RuntimeException
        ignoreExceptions:
          - java.lang.IllegalArgumentException
  timelimiter:
    instances:
      paymentService:           # имя экземпляра TimeLimiter
        timeoutDuration: 2000ms  # ограничение времени выполнения (500 миллисекунд)
        cancelRunningFuture: true  # пытаться прервать асинхронную операцию при таймауте

  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 10
        maxWaitDuration: 0
        writableStackTraceEnabled: true
        eventConsumerBufferSize: 100
    instances:
      paymentService:                    # имя сервиса
        baseConfig: default              # наследовать настройки из default
        maxConcurrentCalls: 5            # только 5 одновременных вызовов к платежам
        maxWaitDuration: 0               # не ждать, сразу отказ

payment:
  retry:
    max-attempts: 3
    timeout: 30
    batch-size: 100  # Максимум 50 заказов за один запуск сканера
scheduling:
  payment-scanner:
    fixed-delay: 30000  # 30 секунд между запусками
    initial-delay: 30000

